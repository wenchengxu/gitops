appName: gpu-infer
type: gpu
chart: common-gpu

image:
  repository: harbor.example.com/gpu/gpu-infer

containerPort: 8000

service:
  enabled: true
  type: ClusterIP
  port: 8000
  targetPort: 8000

ingress:
  enabled: true
  path: /

resources:
  requests:
    cpu: "4"
    memory: 16Gi
    nvidia.com/gpu: "1"
  limits:
    cpu: "8"
    memory: 32Gi
    nvidia.com/gpu: "1"

nodeSelector:
  accelerator: nvidia

tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule

owner: ai-team
