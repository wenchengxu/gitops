{{- if and .Values.enabled .Values.ingress.enabled }}
{{- $host := "" -}}
{{- if .Values.ingress.host -}}
{{- $host = .Values.ingress.host -}}
{{- else if and .Values.ingress.hostPrefix .Values.ingress.domainSuffix -}}
{{- $host = printf "%s.%s" .Values.ingress.hostPrefix .Values.ingress.domainSuffix -}}
{{- else -}}
{{- $host = printf "%s.local" (include "common.fullname" .) -}}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "common.fullname" . }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    - host: {{ $host | quote }}
      http:
        paths:
          - path: {{ default "/" .Values.ingress.path }}
            pathType: {{ default "Prefix" .Values.ingress.pathType }}
            backend:
              service:
                name: {{ include "common.fullname" . }}
                port:
                  number: {{ default 80 .Values.service.port }}
  {{- if and .Values.ingress.tls.enabled .Values.ingress.tls.secretName }}
  tls:
    - hosts:
        - {{ $host | quote }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
{{- end }}
