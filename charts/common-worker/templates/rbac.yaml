{{- if and .Values.enabled .Values.rbac.create }}
{{- $saName := default (include "common.fullname" .) .Values.serviceAccount.name -}}
{{- $clusterRoleName := default (printf "%s-clusterrole" (include "common.fullname" .)) .Values.rbac.clusterRole.name -}}
{{- $roleName := default (printf "%s-role" (include "common.fullname" .)) .Values.rbac.role.name -}}
{{- if .Values.rbac.clusterRole.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $clusterRoleName }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
rules:
  {{- if .Values.rbac.clusterRole.rules }}
  {{- toYaml .Values.rbac.clusterRole.rules | nindent 2 }}
  {{- else }}
  - apiGroups: [""]
    resources: ["nodes", "persistentvolumes", "persistentvolumeclaims", "services", "endpoints", "events", "pods"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ default (printf "%s-clusterrolebinding" (include "common.fullname" .)) .Values.rbac.clusterRole.bindingName }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ $saName }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $clusterRoleName }}
{{- end }}
{{- if .Values.rbac.role.create }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $roleName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
rules:
  {{- if .Values.rbac.role.rules }}
  {{- toYaml .Values.rbac.role.rules | nindent 2 }}
  {{- else }}
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ default (printf "%s-rolebinding" (include "common.fullname" .)) .Values.rbac.role.bindingName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ $saName }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $roleName }}
{{- end }}
{{- end }}
