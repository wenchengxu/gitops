clusterName: infra-cluster
server: https://kubernetes.default.svc

namespacePrefix: infra

ingress:
  className: nginx
  domainSuffix: infra.example.com

imagePullSecrets:
  - name: harbor-secret

storageClassName: nfs-client

capabilities:
  gpu: false
  rwx: true

nfsServers:
  main:
    server: 10.110.128.13
    path: /bayuegua-nfs/infra

nodeSelector: {}
tolerations: []
