---
# Source: common-backend/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: order-service
  labels:
    app.kubernetes.io/name: order-service
    app.kubernetes.io/instance: test-backend
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: common-backend-0.1.0
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: order-service
    app.kubernetes.io/instance: test-backend
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
---
# Source: common-backend/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  labels:
    app.kubernetes.io/name: order-service
    app.kubernetes.io/instance: test-backend
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: common-backend-0.1.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: order-service
      app.kubernetes.io/instance: test-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: order-service
        app.kubernetes.io/instance: test-backend
        app.kubernetes.io/managed-by: Helm
        helm.sh/chart: common-backend-0.1.0
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: order-service
          image: "harbor.example.com/backend/order-service:dev-initial"
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            dev
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
          volumeMounts:
      volumes:
---
# Source: common-backend/templates/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: order-service
  labels:
    app.kubernetes.io/name: order-service
    app.kubernetes.io/instance: test-backend
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: common-backend-0.1.0
spec:
  ingressClassName: nginx
  rules:
    - host: "order-service.local"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: order-service
                port:
                  number: 8080
