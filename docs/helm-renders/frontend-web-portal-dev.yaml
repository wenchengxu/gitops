---
# Source: common-frontend/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: web-portal
  labels:
    app.kubernetes.io/name: web-portal
    app.kubernetes.io/instance: test-frontend
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: common-frontend-0.1.0
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: web-portal
    app.kubernetes.io/instance: test-frontend
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
---
# Source: common-frontend/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-portal
  labels:
    app.kubernetes.io/name: web-portal
    app.kubernetes.io/instance: test-frontend
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: common-frontend-0.1.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: web-portal
      app.kubernetes.io/instance: test-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web-portal
        app.kubernetes.io/instance: test-frontend
        app.kubernetes.io/managed-by: Helm
        helm.sh/chart: common-frontend-0.1.0
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: web-portal
          image: "harbor.example.com/frontend/web-portal:dev-initial"
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
            dev
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
          volumeMounts:
      volumes:
---
# Source: common-frontend/templates/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web-portal
  labels:
    app.kubernetes.io/name: web-portal
    app.kubernetes.io/instance: test-frontend
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: common-frontend-0.1.0
spec:
  ingressClassName: nginx
  rules:
    - host: "web-portal.local"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-portal
                port:
                  number: 80
