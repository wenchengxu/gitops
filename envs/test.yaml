envName: test

replicaCount: 2

image:
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

hpa:
  enabled: false

persistenceDefaults:
  storageClassName: nfs-client
  accessModes:
    - ReadWriteOnce
  size: 50Gi

logLevel: info
